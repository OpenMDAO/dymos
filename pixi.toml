[workspace]
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64", "win-64"]

[dependencies]
python = ">=3.11"
pip = "*"
compilers = ">=1.8.0,<2"
networkx = ">=3.3"
packaging = ">=25.0"
requests = ">=2.32.5"

[pypi-dependencies]
jax = "*"

[feature.opt.dependencies]
pyoptsparse = ">=2.14.0"
cyipopt = "*"

[feature.mpi.target.linux-64.dependencies]
openmpi = "*"
mpi4py = "*"
petsc = "*"
petsc4py = "*"

[feature.mpi.target.osx-64.dependencies]
openmpi = "*"
mpi4py = "*"
petsc = "*"
petsc4py = "*"

[feature.mpi.target.osx-arm64.dependencies]
openmpi = "*"
mpi4py = "*"
petsc = "*"
petsc4py = "*"

[feature.test.dependencies]
pre-commit = "*"
ruff = "*"
coverage = ">=7.6.0"
numpydoc = "*"
matplotlib = "*"

[feature.test.pypi-dependencies]
testflo = "*"

[feature.docs.dependencies]
jupyter-book = ">=1.0.3,<2"
matplotlib = "*"
numpydoc = "*"
sphinx-sitemap = "*"
jinja2 = "*"
tqdm = "*"

[feature.docs.pypi-dependencies]
jax = "*"

[feature.notebooks.dependencies]
ipympl = "*"
notebook = "*"
idna = "*"

[feature.numba.dependencies]
numba = "*"

[feature.actionlint.dependencies]
actionlint = "*"

[feature.oldest.dependencies]
python = "3.11.*"
numpy = "2.0.*"
scipy = "1.13.*"

[feature.oldest.pypi-dependencies]
openmdao = "==3.39.0"

[feature.dev-local.dependencies]
swig = "*"
ninja = "*"
meson-python = "*"

[feature.dev-local.tasks]
install-local-openmdao = { cmd = "pip uninstall -y openmdao && python -c \"import pathlib, site, shutil; site_pkgs = pathlib.Path(site.getsitepackages()[0]); [shutil.rmtree(p, ignore_errors=True) for p in site_pkgs.glob('openmdao*')]\" && pip install --no-deps -e $OPENMDAO_SRC", description = "Install openmdao from local source in editable mode (dev-local only). Requires OPENMDAO_SRC environment variable (e.g., OPENMDAO_SRC=~/Codes/openmdao.git)." }
install-local-pyoptsparse = { cmd = "pip uninstall -y pyoptsparse && python -c \"import pathlib, site, shutil; site_pkgs = pathlib.Path(site.getsitepackages()[0]); [shutil.rmtree(p, ignore_errors=True) for p in site_pkgs.glob('pyoptsparse*')]\" && pip install --no-build-isolation -e $PYOPTSPARSE_SRC", description = "Install pyoptsparse from local source in editable mode (dev-local only). Requires PYOPTSPARSE_SRC environment variable (e.g., PYOPTSPARSE_SRC=~/Codes/pyoptsparse.git)." }
install-unopy = { cmd = "pip install --no-build-isolation unopy", description = "Install unopy with isolation disabled to allow access to system libraries during build (dev-local only)." }

[feature.default-env.dependencies]
openmdao = ">=3.39.0"

[feature.oldest-env.dependencies]
openmdao = "==3.39.0"

[environments]
default = { features = ["test", "opt", "mpi", "default-env"], solve-group = "default" }
dev = { features = ["test", "docs", "notebooks", "numba", "opt", "mpi", "actionlint", "default-env"], solve-group = "default" }
dev-local = { features = ["test", "docs", "notebooks", "numba", "opt", "mpi", "actionlint", "dev-local"], solve-group = "dev_local" }
oldest = { features = ["test", "oldest", "mpi", "oldest-env"], solve-group = "oldest" }

[tasks]
install-openmdao-github-master = { cmd = "pip install --no-deps git+https://github.com/OpenMDAO/OpenMDAO@master", description = "Install the Github master version of OpenMDAO." }
