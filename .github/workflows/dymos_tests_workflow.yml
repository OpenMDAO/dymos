# Run Tests

name: Dymos Tests

on:
  # Trigger on push, pull request
  push:
    branches: [ master ]
  pull_request:
    branches: [ master, develop ]

  # Allow running the workflow manually from the Actions tab
  # All jobs are excluded by default, desired jobs must be selected
  workflow_dispatch:

    inputs:

      run_name:
        type: string
        description: 'Name of workflow run as it will appear under Actions tab:'
        required: false
        default: ""

      baseline:
        type: boolean
        description: "Include 'baseline' in test matrix"
        required: false
        default: true

      pep517:
        type: boolean
        description: "Include 'pep517' in test matrix"
        required: false
        default: true

      use_pypi:
        type: boolean
        description: 'Run tests against the published PyPI version of Dymos'
        required: false
        default: false

      dymos_pixi:
        type: boolean
        description: "Include tests of dymos' local pixi environment job"
        required: false
        default: true

      dymos_pixi_openmdao_github:
        type: string
        description: "OpenMDAO ref to install from GitHub in the dev-local test (branch, tag, or commit hash). Leave empty to skip."
        required: false
        default: 'master'

      save_pixi_lock:
        type: boolean
        description: "Upload pixi.lock as a 1-day artifact for each test_dymos_pixi matrix entry"
        required: false
        default: false

concurrency:
  # Cancel any existing CI runs if we push to this branch
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

run-name:  ${{ inputs.run_name }}

jobs:

  test_ubuntu:
    runs-on: ubuntu-22.04

    defaults:
      run:
        shell: bash -l {0}

    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        include:
          # baseline versions
          - NAME: baseline
            OPENMDAO_PIXI_ENVIRONMENT: 'py313'
            OPENMDAO_INSTALL_FROM: 'pypi'
            OPENMDAO: ''
            EXCLUDE: ${{ github.event_name == 'workflow_dispatch'  && ! inputs.baseline }}

          # test PEP517 wheel build (no coverage)
          - NAME: pep517
            OPENMDAO_PIXI_ENVIRONMENT: 'py313'
            OPENMDAO_INSTALL_FROM: 'pypi'
            OPENMDAO: ''
            PEP517: True
            SKIP_COVERAGE: True
            EXCLUDE: ${{ github.event_name == 'workflow_dispatch'  && ! inputs.pep517 }}

    steps:
      - name: Display run details
        run: |
          eval "$(pixi shell-hook -e ${{ matrix.OPENMDAO_PIXI_ENVIRONMENT }} --manifest-path=${{ env.PIXI_MANIFEST }})"
          echo "============================================================="
          echo "Run #${GITHUB_RUN_NUMBER}"
          echo "Run ID: ${GITHUB_RUN_ID}"
          echo "Testing: ${GITHUB_REPOSITORY}"
          echo "Triggered by: ${GITHUB_EVENT_NAME}"
          echo "Initiated by: ${GITHUB_ACTOR}"
          echo "============================================================="
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ matrix.EXCLUDE }}" == "false" ]]; then
              echo "Triggered by 'workflow_dispatch', '${{ matrix.NAME }}' build was selected and will run."
            else
              echo "Triggered by 'workflow_dispatch', '${{ matrix.NAME }}' build not selected and will not run."
            fi
          fi

      - name: Checkout code
        if: ${{ ! matrix.EXCLUDE }}
        uses: actions/checkout@v6

      - name: 'Setup OpenMDAO pixi Environment'
        id: setup_pixi_environment
        uses: OpenMDAO/OpenMDAO/.github/actions/setup_openmdao_pixi@master
        with:
          environment: '${{ matrix.OPENMDAO_PIXI_ENVIRONMENT }}'
          openmdao_install_from: '${{ matrix.OPENMDAO_INSTALL_FROM }}'
          openmdao_version: '${{ matrix.OPENMDAO }}'

      - name: Install Dymos
        if: ${{ ! matrix.EXCLUDE }}
        run: |
          eval "$(pixi shell-hook -e ${{ matrix.OPENMDAO_PIXI_ENVIRONMENT }} --manifest-path=${{ env.PIXI_MANIFEST }})"
          echo "============================================================="
          echo "Install Dymos"
          echo "============================================================="
          if [[  "${{ inputs.use_pypi }}" == "true" ]]; then
            echo "-----------------------------------------------------------"
            echo "Installing from PyPI"
            echo "-----------------------------------------------------------"
            python -m pip install dymos --no-deps
          elif [[ "${{ matrix.PEP517 }}" == "true" ]]; then
            pip wheel --no-deps --use-pep517 .
            WHEEL=$(find dymos-*.whl)
            echo "-----------------------------------------------------------"
            echo "Installing from wheel: $WHEEL"
            echo "-----------------------------------------------------------"
            python -m pip install "$WHEEL"
          else
            echo "-----------------------------------------------------------"
            echo "Installing as editable install for coverage support"
            echo "-----------------------------------------------------------"
            python -m pip install -e . --no-deps
          fi

      - name: Install optional dependencies
        if: matrix.OPENMDAO_PIXI_ENVIRONMENT == 'dev'
        run: |
          eval "$(pixi shell-hook -e ${{ matrix.OPENMDAO_PIXI_ENVIRONMENT }} --manifest-path=${{ env.PIXI_MANIFEST }})"
          echo "============================================================="
          echo "Install additional packages for testing/coverage"
          echo "============================================================="
          echo "Pre-install playwright dependencies to avoid 'Playwright Host validation warning'"
          pip install playwright
          playwright install --with-deps

      - name: Perform linting with Ruff
        if: ${{ ! matrix.EXCLUDE && matrix.NAME == 'baseline' }}
        run: |
          eval "$(pixi shell-hook -e ${{ matrix.OPENMDAO_PIXI_ENVIRONMENT }} --manifest-path=${{ env.PIXI_MANIFEST }})"
          echo "============================================================="
          echo "Lint Dymos code per settings in pyproject.toml"
          echo "============================================================="
          ruff check . --config pyproject.toml

      - name: Check MPI and PETSc
        continue-on-error: true
        run: |
          eval "$(pixi shell-hook -e ${{ matrix.OPENMDAO_PIXI_ENVIRONMENT }} --manifest-path=${{ env.PIXI_MANIFEST }})"
          if python -c "import mpi4py, petsc4py" 2>/dev/null; then
            echo "============================================================="
            echo "Check MPI and PETSc installation"
            echo "============================================================="
            export PRTE_MCA_rmaps_default_mapping_policy=:oversubscribe
            export OMPI_MCA_rmaps_base_oversubscribe=1
            export OMPI_MCA_btl=^openib
            echo "-----------------------"
            echo "Quick test of mpi4py:"
            mpirun -n 3 python -c "from mpi4py import MPI; print(f'Rank: {MPI.COMM_WORLD.rank}')"
            echo "-----------------------"
            echo "Quick test of petsc4py:"
            mpirun -n 3 python -c "import numpy; from mpi4py import MPI; comm = MPI.COMM_WORLD; \
              import petsc4py; petsc4py.init(); \
              x = petsc4py.PETSc.Vec().createWithArray(numpy.ones(5)*comm.rank, comm=comm);  \
              print(x.getArray())"
            echo "-----------------------"

            # shellcheck disable=SC2129
            echo "PRTE_MCA_rmaps_default_mapping_policy=:oversubscribe" >> "$GITHUB_ENV"
            echo "OMPI_MCA_rmaps_base_oversubscribe=1" >> "$GITHUB_ENV"
            echo "OMPI_MCA_btl=^openib" >> "$GITHUB_ENV"

            echo "Workaround for intermittent failures with OMPI https://github.com/open-mpi/ompi/issues/7393"
            echo "TMPDIR=/tmp" >> "$GITHUB_ENV"
          else
            echo "mpi4py or petsc4py not installed in this environment, skipping MPI checks"
          fi

      - name: Run tests
        id: run_tests
        if: ${{ ! matrix.EXCLUDE }}
        env:
          OPENMDAO_CHECK_ALL_PARTIALS: True
        continue-on-error: true
        run: |
          eval "$(pixi shell-hook -e ${{ matrix.OPENMDAO_PIXI_ENVIRONMENT }} --manifest-path=${{ env.PIXI_MANIFEST }})"
          echo "============================================================="
          echo "Run Tests"
          echo "Environment:"
          echo "   OPENMDAO_CHECK_ALL_PARTIALS: $OPENMDAO_CHECK_ALL_PARTIALS"
          echo "============================================================="
          testflo -n 1 docs/dymos_book/test --pre_announce || HAS_ERRORS=true
          testflo -n 1 joss/test --pre_announce || HAS_ERRORS=true
          testflo -b benchmark --pre_announce || HAS_ERRORS=true
          # Run the readme test from the checked out directory.
          testflo -n 1 ./dymos/test/test_readme.py --pre_announce || HAS_ERRORS=true
          if [[ "${{ matrix.NAME }}" != "latest" && "${{ matrix.SKIP_COVERAGE }}" != "true" ]]; then
            echo "Coverage files before moving to HOME:"
            ls -la .coverage* 2>/dev/null || echo "No .coverage files found"
            cp .coveragerc $HOME
            cd $HOME
            testflo dymos -n 4 --pre_announce --show_skipped --durations 20 --coverage --coverpkg dymos || HAS_ERRORS=true
          else
            cd $HOME
            testflo dymos -n 4 --pre_announce --show_skipped --durations 20 || HAS_ERRORS=true
          fi

          if [ "$HAS_ERRORS" = true ]; then
            echo "One or more commands failed"
            exit 1
          fi

      - name: Submit coverage
        if: steps.run_tests.outcome == 'success' && github.event_name != 'workflow_dispatch' && ! matrix.SKIP_COVERAGE
        continue-on-error: true
        env:
          COVERALLS_REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COVERALLS_SERVICE_NAME: "github"
          COVERALLS_PARALLEL: True
          # These three ensure the SHA and branch are NEVER empty
          COVERALLS_GIT_COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
          COVERALLS_GIT_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          eval "$(pixi shell-hook -e ${{ matrix.OPENMDAO_PIXI_ENVIRONMENT }} --manifest-path=${{ env.PIXI_MANIFEST }})"
          echo "============================================================="
          echo "Submit coverage"
          echo "============================================================="
          cd $HOME
          coverage report -m
          pip install coveralls
          coveralls --basedir $GITHUB_WORKSPACE/dymos
          # Copy coverage file back to repo for artifact upload
          cp $HOME/.coverage .

      # Uncomment for debug if coverage isn't working as expected.
      # - name: Upload coverage artifacts
      #   if: steps.run_tests.outcome == 'success' && github.event_name != 'workflow_dispatch' && ! matrix.SKIP_COVERAGE
      #   continue-on-error: true
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: coverage-${{ matrix.NAME }}
      #     path: .coverage
      #     retention-days: 7
      #     if-no-files-found: warn
      #     include-hidden-files: true

      - name: Fail the workflow if tests failed
        if: steps.run_tests.outcome != 'success'
        run: |
          echo "Tests failed"
          exit 1

  test_dymos_pixi:
    # Test dymos-native pixi environments defined in pyproject.toml using the frozen pixi.lock.
    runs-on: ${{ matrix.runs-on }}

    defaults:
      run:
        shell: bash

    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        include:
          # default env on all three platforms
          - pixi-env: default
            runs-on: ubuntu-latest
            EXCLUDE: ${{ github.event_name == 'workflow_dispatch' && !inputs.dymos_pixi }}
          - pixi-env: default
            runs-on: macos-latest
            EXCLUDE: ${{ github.event_name == 'workflow_dispatch' && !inputs.dymos_pixi }}
          - pixi-env: default
            runs-on: windows-latest
            EXCLUDE: ${{ github.event_name == 'workflow_dispatch' && !inputs.dymos_pixi }}
          # remaining envs on Linux only
          - pixi-env: oldest
            runs-on: ubuntu-latest
            EXCLUDE: ${{ github.event_name == 'workflow_dispatch' && !inputs.dymos_pixi }}
          - pixi-env: dev
            runs-on: ubuntu-latest
            EXCLUDE: ${{ github.event_name == 'workflow_dispatch' && !inputs.dymos_pixi }}
          # dev-local with OpenMDAO installed from GitHub
          - pixi-env: dev-local
            runs-on: ubuntu-latest
            install_openmdao_github: true
            EXCLUDE: ${{ github.event_name == 'workflow_dispatch' && inputs.dymos_pixi_openmdao_github == '' }}
          - pixi-env: dev-local
            runs-on: macos-latest
            install_openmdao_github: true
            EXCLUDE: ${{ github.event_name == 'workflow_dispatch' && inputs.dymos_pixi_openmdao_github == '' }}

    steps:
      - name: Checkout code
        if: ${{ !matrix.EXCLUDE }}
        uses: actions/checkout@v6

      - name: Upload pixi.lock artifact
        if: ${{ !matrix.EXCLUDE && github.event_name == 'workflow_dispatch' && inputs.save_pixi_lock }}
        uses: actions/upload-artifact@v7
        with:
          name: pixi-lock-${{ matrix.pixi-env }}-${{ matrix.runs-on }}
          path: pixi.lock
          retention-days: 1

      - name: Setup pixi
        if: ${{ !matrix.EXCLUDE }}
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          environments: ${{ matrix.pixi-env }}

      - name: Install OpenMDAO from GitHub
        if: ${{ !matrix.EXCLUDE && matrix.install_openmdao_github }}
        run: |
          eval "$(pixi shell-hook -e ${{ matrix.pixi-env }} --manifest-path $GITHUB_WORKSPACE/pyproject.toml)"
          OPENMDAO_REF="${{ inputs.dymos_pixi_openmdao_github || 'master' }}"
          echo "============================================================="
          echo "Install OpenMDAO from GitHub ref: $OPENMDAO_REF"
          echo "============================================================="
          pip install --no-deps git+https://github.com/OpenMDAO/OpenMDAO@${OPENMDAO_REF}

      - name: Check MPI and PETSc
        if: ${{ !matrix.EXCLUDE }}
        continue-on-error: true
        run: |
          if pixi run -e ${{ matrix.pixi-env }} python -c "import mpi4py, petsc4py" 2>/dev/null; then
            echo "============================================================="
            echo "Check MPI and PETSc installation"
            echo "============================================================="
            export PRTE_MCA_rmaps_default_mapping_policy=:oversubscribe
            export OMPI_MCA_rmaps_base_oversubscribe=1
            export OMPI_MCA_btl=^openib
            echo "-----------------------"
            echo "Quick test of mpi4py:"
            pixi run -e ${{ matrix.pixi-env }} mpirun -n 3 python -c "from mpi4py import MPI; print(f'Rank: {MPI.COMM_WORLD.rank}')"
            echo "-----------------------"

            # shellcheck disable=SC2129
            echo "PRTE_MCA_rmaps_default_mapping_policy=:oversubscribe" >> "$GITHUB_ENV"
            echo "OMPI_MCA_rmaps_base_oversubscribe=1" >> "$GITHUB_ENV"
            echo "OMPI_MCA_btl=^openib" >> "$GITHUB_ENV"
            echo "Workaround for intermittent failures with OMPI https://github.com/open-mpi/ompi/issues/7393"
            echo "TMPDIR=/tmp" >> "$GITHUB_ENV"
          else
            echo "mpi4py or petsc4py not installed in this environment, skipping MPI checks"
          fi

      - name: Run tests
        id: run_dymos_pixi_tests
        if: ${{ !matrix.EXCLUDE }}
        env:
          OPENMDAO_CHECK_ALL_PARTIALS: True
        continue-on-error: true
        run: |
          eval "$(pixi shell-hook -e ${{ matrix.pixi-env }} --manifest-path $GITHUB_WORKSPACE/pyproject.toml)"
          echo "============================================================="
          echo "Run Tests (pixi environment: ${{ matrix.pixi-env }})"
          echo "============================================================="
          cd $GITHUB_WORKSPACE
          testflo -n 1 docs/dymos_book/test --pre_announce || HAS_ERRORS=true
          testflo -n 1 joss/test --pre_announce || HAS_ERRORS=true
          testflo -b benchmark --pre_announce || HAS_ERRORS=true
          # Run the readme test from the checked out directory.
          testflo -n 1 ./dymos/test/test_readme.py --pre_announce || HAS_ERRORS=true
          cd $HOME
          testflo dymos -n 4 --pre_announce --show_skipped --durations 20 || HAS_ERRORS=true

          if [ "$HAS_ERRORS" = true ]; then
            echo "One or more commands failed"
            exit 1
          fi

      - name: Fail the workflow if tests failed
        if: ${{ !matrix.EXCLUDE && steps.run_dymos_pixi_tests.outcome != 'success' }}
        run: |
          echo "Tests failed"
          exit 1

  coveralls:
    name: Finish coveralls
    if: github.event_name != 'workflow_dispatch'
    continue-on-error: true
    needs: test_ubuntu
    runs-on: ubuntu-latest
    steps:
    - uses: coverallsapp/github-action@master
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        parallel-finished: true
